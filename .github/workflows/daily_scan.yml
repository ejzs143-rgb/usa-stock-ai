name: Daily Stock Scan
on:
  schedule:
    - cron: '30 14,22 * * *' # 日本時間 23:30 と 07:00 に実行
  workflow_dispatch: # 手動実行用ボタン

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pandas yfinance textblob requests lxml pytz
      - name: Run scan
        run: python scan_script.py
      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add sp500_ranking.csv
          git commit -m "Update ranking" || exit 0
          git push
