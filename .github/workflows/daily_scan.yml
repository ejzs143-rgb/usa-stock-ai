name: Daily Stock Scan
on:
  schedule:
    - cron: '30 14,22 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install pandas yfinance requests numpy lxml
      - name: Run scan
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python scan_script.py
      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add raw_stock_data.csv
          git commit -m "Update stock data" || exit 0
          git push
