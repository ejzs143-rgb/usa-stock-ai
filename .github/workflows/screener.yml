name: Auto Stock Screener

on:
  schedule:
    # 毎日 日本時間の朝7:00（UTCの22:00）に自動で実行するタイマー
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動でテスト実行するためのボタン

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - name: コードの取得
        uses: actions/checkout@v3
      
      - name: Pythonの準備
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: ライブラリのインストール
        run: pip install pandas yfinance requests
        
      - name: 監視スクリプトの実行とLINE通知
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python auto_screener.py
